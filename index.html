<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>METS/LOG — 週10メッツ・時の記録</title>
<style>
:root{
  --paper:#FFFFFF;
  --ink:#1C1C1A;
  --ink-2:#7A776F;      /* 補足テキスト */
  --hairline:#E6E3DC;   /* 細罫線 */
  --wash:#F6F5F1;       /* ごく薄い面 */
  --blue:#3656C8;       /* インクブルー(数値・進捗) */
  --blue-wash:#EDF1FA;
  --blue-line:#C7D2EE;
  --vermilion:#D9482B;  /* 朱(目標達成) */
  --en:"Helvetica Neue", Helvetica, Arial, sans-serif;
  --jp:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:var(--jp);
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:120px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:560px;margin:0 auto;padding:0 20px}

/* ---------- ロゴ行 ---------- */
.brand{
  padding:18px 20px 0;
  max-width:560px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:baseline;
}
.brand .logo{
  font-family:var(--en);font-weight:700;font-size:1rem;letter-spacing:.02em;
}
.brand .yr{font-family:var(--en);font-size:.75rem;color:var(--ink-2);letter-spacing:.08em}

/* ---------- ヘッダー(週スコア) ---------- */
header{padding:26px 0 8px;border-bottom:1px solid var(--hairline)}
.week-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.78rem;color:var(--ink-2);letter-spacing:.06em;
}
.week-nav{display:flex;gap:2px}
.week-nav button{
  background:none;border:1px solid var(--hairline);color:var(--ink);
  width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;
  font-family:var(--en);line-height:1;
}
.week-nav button:active{background:var(--wash)}
.week-nav button:focus-visible{outline:2px solid var(--ink)}
.week-nav button:disabled{opacity:.3}

.score{
  display:flex;align-items:baseline;gap:10px;margin-top:14px;position:relative;
  font-family:var(--en);
}
.score .now{font-size:4.4rem;font-weight:300;line-height:1;letter-spacing:-.03em}
.score .unit{font-size:.85rem;color:var(--ink-2);font-family:var(--jp)}
.score .goal{margin-left:auto;font-size:.85rem;color:var(--ink-2);font-family:var(--jp)}
.score .goal b{font-family:var(--en);font-weight:700;color:var(--blue);font-size:1.1rem;margin-left:2px}

/* ---------- 進捗(定規のような細いバー) ---------- */
.track{margin:20px 0 4px}
.track-lane{
  position:relative;height:10px;background:var(--blue-wash);border-radius:5px;overflow:hidden;
}
.track-fill{
  position:absolute;inset:0 auto 0 0;width:0%;
  background:var(--blue);border-radius:5px;
  transition:width .6s cubic-bezier(.22,1,.36,1);
}
.track-fill.over{background:var(--vermilion)}
.track-ticks{
  display:flex;justify-content:space-between;margin-top:6px;
  font-family:var(--en);font-size:.7rem;color:var(--ink-2);
}
.remain{margin:14px 0 18px;font-size:.82rem;color:var(--ink-2);line-height:1.8}
.remain b{color:var(--blue);font-family:var(--en);font-weight:700}
.remain .ok{color:var(--vermilion);font-weight:700}

/* ---------- セクション ---------- */
section{margin-top:34px}
h2{
  display:flex;align-items:baseline;gap:10px;
  font-family:var(--en);font-size:1rem;font-weight:700;letter-spacing:.01em;
  padding-bottom:10px;border-bottom:1px solid var(--ink);
  margin-bottom:2px;
}
h2 .jp{font-family:var(--jp);font-weight:400;font-size:.72rem;color:var(--ink-2);letter-spacing:.1em}

/* ---------- クイック記録 ---------- */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding-top:14px}
.chip{
  background:var(--blue-wash);border:1px solid var(--blue-line);border-radius:999px;
  padding:8px 16px;font-size:.82rem;cursor:pointer;color:var(--ink);
  font-family:var(--jp);
}
.chip b{font-family:var(--en);font-weight:700;margin-left:6px;color:var(--blue)}
.chip:active{background:var(--blue-line)}
.chip:focus-visible{outline:2px solid var(--vermilion)}

/* ---------- 記録リスト(罫線区切り) ---------- */
.day-head{
  font-size:.75rem;color:var(--ink-2);letter-spacing:.06em;
  padding:16px 0 4px;
  display:flex;justify-content:space-between;align-items:baseline;
}
.day-head .day-sum{font-family:var(--en);font-weight:700;color:var(--blue);font-size:.85rem}
.entry{
  display:flex;align-items:center;gap:14px;
  padding:13px 0;border-bottom:1px solid var(--hairline);
}
.entry .info{flex:1;min-width:0}
.entry .name{font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry .meta{font-size:.72rem;color:var(--ink-2);margin-top:3px}
.entry .ex{
  font-family:var(--en);font-weight:700;font-size:1.15rem;line-height:1;text-align:right;white-space:nowrap;
  color:var(--blue);
}
.entry .ex small{font-family:var(--jp);font-weight:400;font-size:.62rem;color:var(--ink-2);margin-left:3px}
.entry .del{
  background:none;border:none;color:#C4C0B6;font-size:1rem;cursor:pointer;padding:6px;
}
.entry .del:active{color:var(--vermilion)}
.empty{
  padding:34px 0;text-align:center;color:var(--ink-2);font-size:.85rem;line-height:1.9;
  border-bottom:1px solid var(--hairline);
}

/* ---------- 過去の週 ---------- */
.history-weeks{display:flex;gap:10px;align-items:flex-end;height:96px;padding-top:18px}
.hw{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;cursor:pointer;background:none;border:none;font-family:var(--jp);padding:0}
.hw .bar-outer{width:100%;max-width:26px;height:58px;background:var(--blue-wash);border-radius:2px;position:relative;overflow:hidden}
.hw .bar{position:absolute;bottom:0;left:0;right:0;background:var(--blue);border-radius:2px 2px 0 0}
.hw.hit .bar{background:var(--vermilion)}
.hw .lbl{font-size:.62rem;color:var(--ink-2);font-family:var(--en)}
.hw:focus-visible{outline:2px solid var(--ink)}

/* ---------- 設定行 ---------- */
.settings-row{
  margin-top:40px;padding-top:14px;border-top:1px solid var(--hairline);
  display:flex;justify-content:center;gap:22px;
  font-size:.75rem;
}
.settings-row button{background:none;border:none;color:var(--ink-2);cursor:pointer;font-size:.75rem;font-family:var(--jp);text-decoration:underline;text-underline-offset:3px}
.settings-row button:active{color:var(--ink)}
.note{font-size:.68rem;color:#B3AFA5;line-height:1.9;margin-top:14px;text-align:center}

/* ---------- 追加ボタン ---------- */
.fab{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--blue);color:var(--paper);border:none;border-radius:999px;
  padding:15px 34px;font-size:.9rem;cursor:pointer;
  font-family:var(--jp);letter-spacing:.1em;
  box-shadow:0 4px 16px rgba(54,86,200,.28);
  z-index:40;
}
.fab:focus-visible{outline:2px solid var(--vermilion);outline-offset:2px}

/* ---------- モーダル ---------- */
.modal{
  position:fixed;inset:0;background:rgba(28,28,26,.35);display:none;
  align-items:flex-end;justify-content:center;z-index:50;
}
.modal.open{display:flex}
.sheet{
  background:var(--paper);width:100%;max-width:560px;
  border-radius:16px 16px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  max-height:88vh;overflow-y:auto;
}
.sheet-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sheet-head h3{
  font-family:var(--en);font-size:1rem;font-weight:700;
}
.sheet-head h3 .jp{font-family:var(--jp);font-weight:400;font-size:.72rem;color:var(--ink-2);margin-left:8px}
.sheet-head button{background:none;border:none;font-size:1.3rem;color:var(--ink-2);cursor:pointer;padding:4px 8px}
label.fld{
  display:block;font-size:.7rem;color:var(--ink-2);letter-spacing:.1em;
  margin:20px 0 8px;
}
input[type=number],input[type=date]{
  width:100%;padding:12px 2px;border:none;border-bottom:1px solid var(--ink);
  font-size:1.05rem;font-family:var(--en);background:transparent;color:var(--ink);
  border-radius:0;
}
input:focus{outline:none;border-bottom:2px solid var(--ink)}

/* 15種目グリッド */
.ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:6px}
.ex-btn{
  border:1px solid var(--hairline);border-radius:8px;
  padding:10px 6px 9px;cursor:pointer;text-align:center;font-family:var(--jp);color:var(--ink);
  background:var(--paper);
}
.ex-btn .nm{font-size:.74rem;line-height:1.4;display:block;min-height:2.8em}
.ex-btn .mn{font-family:var(--en);font-size:.82rem;font-weight:700;display:block;margin-top:4px}
.ex-btn .mn small{font-family:var(--jp);font-weight:400;font-size:.58rem;color:var(--ink-2)}
.ex-btn .mn{color:var(--blue)}
.ex-btn.selected{background:var(--blue);border-color:var(--blue);color:var(--paper)}
.ex-btn.selected .mn{color:var(--paper)}
.ex-btn.selected .mn small{color:var(--blue-line)}
.ex-btn:focus-visible{outline:2px solid var(--vermilion)}
.grid-note{font-size:.68rem;color:var(--ink-2);margin-top:10px;line-height:1.7}

/* 時間コントロール:左右矢印+中央数値 */
.min-ctrl{
  display:flex;align-items:center;gap:10px;
}
.min-ctrl button{
  width:64px;height:64px;flex-shrink:0;
  border:1px solid var(--hairline);border-radius:50%;
  background:var(--paper);color:var(--ink);
  font-family:var(--en);font-size:1.7rem;line-height:1;cursor:pointer;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
.min-ctrl button:active{background:var(--blue-wash);border-color:var(--blue-line);color:var(--blue)}
.min-ctrl button:focus-visible{outline:2px solid var(--blue)}
.min-val{
  flex:1;display:flex;align-items:baseline;justify-content:center;gap:4px;
  border-bottom:1px solid var(--hairline);padding-bottom:4px;
}
.min-val input[type=number]{
  width:5ch;border:none;background:transparent;text-align:right;
  font-family:var(--en);font-size:2.6rem;font-weight:300;letter-spacing:-.02em;
  color:var(--blue);padding:0;
  -moz-appearance:textfield;appearance:textfield;
}
.min-val input::-webkit-outer-spin-button,
.min-val input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.min-val input:focus{outline:none}
.min-val .min-unit{font-size:.8rem;color:var(--ink-2)}

.calc-preview{
  margin-top:24px;padding:16px 0;text-align:center;
  border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline);
}
.calc-preview .formula{font-size:.75rem;color:var(--ink-2)}
.calc-preview .result{font-family:var(--en);font-size:2.2rem;font-weight:300;line-height:1.3;letter-spacing:-.02em;color:var(--blue)}
.calc-preview .result small{font-family:var(--jp);font-size:.7rem;font-weight:400;color:var(--ink-2);margin-left:4px}
.primary{
  width:100%;margin-top:20px;padding:16px;border:none;border-radius:999px;
  background:var(--blue);color:var(--paper);font-size:.92rem;cursor:pointer;font-family:var(--jp);
  letter-spacing:.1em;
}
.primary:disabled{background:#D8D5CC;cursor:not-allowed}
.primary:focus-visible{outline:2px solid var(--vermilion);outline-offset:2px}

@media (prefers-reduced-motion:reduce){
  .track-fill{transition:none}
}
@media(min-width:560px){
  .score .now{font-size:5rem}
}
</style>
</head>
<body>

<div class="brand">
  <span class="logo">METS/LOG</span>
  <span class="yr">Weekly Exercise Record</span>
</div>

<header>
  <div class="wrap">
    <div class="week-label">
      <span id="weekRange">—</span>
      <div class="week-nav">
        <button id="prevWeek" aria-label="前の週">‹</button>
        <button id="nextWeek" aria-label="次の週">›</button>
      </div>
    </div>
    <div class="score">
      <span class="now" id="weekTotal">0</span>
      <span class="unit">メッツ・時</span>
      <span class="goal">目標 <b id="goalDisp">10</b></span>
    </div>
    <div class="track">
      <div class="track-lane" aria-hidden="true"><div class="track-fill" id="trackFill"></div></div>
      <div class="track-ticks" id="trackTicks"></div>
    </div>
    <div class="remain" id="remainText"></div>
  </div>
</header>

<main class="wrap">
  <section id="quickSec" style="display:none">
    <h2>Quick <span class="jp">クイック記録</span></h2>
    <div class="chips" id="quickChips"></div>
  </section>

  <section>
    <h2>Log <span class="jp" id="listTitleJp">今週の記録</span></h2>
    <div id="entryList"></div>
  </section>

  <section>
    <h2>Weeks <span class="jp">これまでの週</span></h2>
    <div class="history-weeks" id="historyWeeks"></div>
  </section>

  <div class="settings-row">
    <button id="goalBtn">目標を変更</button>
    <button id="exportBtn">データ書き出し</button>
    <button id="importBtn">読み込み</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
  <p class="note">各運動の「◯分」を続けると1メッツ・時。<br>データはこの端末のブラウザ内(localStorage)に保存されます。</p>
</main>

<button class="fab" id="addBtn">＋ 運動を記録</button>

<!-- 記録モーダル -->
<div class="modal" id="addModal" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="sheet">
    <div class="sheet-head">
      <h3 id="sheetTitle">Record <span class="jp">運動を記録</span></h3>
      <button id="closeModal" aria-label="閉じる">×</button>
    </div>

    <label class="fld">運動を選ぶ</label>
    <div class="ex-grid" id="exGrid"></div>
    <p class="grid-note">表示の分数=1メッツ・時に相当する時間</p>

    <label class="fld" for="minInput">時間(分)</label>
    <div class="min-ctrl">
      <button type="button" id="minDown" aria-label="1分減らす">‹</button>
      <div class="min-val">
        <input type="number" id="minInput" min="1" max="600" step="1" inputmode="numeric" aria-label="時間(分)">
        <span class="min-unit">分</span>
      </div>
      <button type="button" id="minUp" aria-label="1分増やす">›</button>
    </div>

    <label class="fld" for="dateInput">日付</label>
    <input type="date" id="dateInput">

    <div class="calc-preview">
      <div class="formula" id="calcFormula">運動と時間を選んでください</div>
      <div class="result" id="calcResult">— <small>メッツ・時</small></div>
    </div>

    <button class="primary" id="saveBtn" disabled>記録する</button>
  </div>
</div>

<script>
"use strict";
/* ====== 運動リスト(番組の表より:◯分 = 1メッツ・時) ====== */
const EXERCISES = [
 {name:"散歩(早歩き)",              unitMin:13},
 {name:"ゆっくりジョギング(6.6km/時)", unitMin:9},
 {name:"ランニング(9.0km/時)",       unitMin:7},
 {name:"クロール",                   unitMin:8},
 {name:"水中歩行",                   unitMin:13},
 {name:"階段をのぼる",               unitMin:9},
 {name:"登山",                       unitMin:8},
 {name:"自転車",                     unitMin:9},
 {name:"縄跳び",                     unitMin:5},
 {name:"卓球",                       unitMin:15},
 {name:"フィットネスクラブでの運動",   unitMin:11},
 {name:"ヨガ",                       unitMin:15},
 {name:"社交ダンス",                 unitMin:10},
 {name:"ウエイトトレーニング",        unitMin:12},
 {name:"テニス(ダブルス)",           unitMin:10}
];

/* ====== 状態 ====== */
const KEY = "mets-log-v1";
let state = load();
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(KEY));
    if(s && Array.isArray(s.entries)) return {goal: s.goal||10, entries: s.entries};
  }catch(e){}
  return {goal:10, entries:[]}; // entry: {id, date:"YYYY-MM-DD", name, unitMin, min}
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

/* ====== 日付ユーティリティ(月曜始まり) ====== */
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
function mondayOf(d){
  const x = new Date(d); x.setHours(0,0,0,0);
  const day = (x.getDay()+6)%7; // 月=0
  x.setDate(x.getDate()-day);
  return x;
}
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
let viewMonday = mondayOf(new Date());

const DOW = ["月","火","水","木","金","土","日"];
function jpDate(str){
  const [y,m,d] = str.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  return `${m}/${d}(${DOW[(dt.getDay()+6)%7]})`;
}

/* ====== 計算 ====== */
// unitMin分 = 1メッツ・時。旧形式(mets)のデータも念のため換算
const exOf = e => e.unitMin ? e.min/e.unitMin : (e.mets||0)*e.min/60;
function weekEntries(mon){
  const from = fmt(mon), to = fmt(addDays(mon,6));
  return state.entries.filter(e => e.date>=from && e.date<=to);
}
const round1 = v => Math.round(v*10)/10;

/* ====== ヘッダー描画 ====== */
function renderHeader(){
  const end = addDays(viewMonday,6);
  const isThisWeek = fmt(viewMonday)===fmt(mondayOf(new Date()));
  document.getElementById("weekRange").textContent =
    `${viewMonday.getMonth()+1}/${viewMonday.getDate()} — ${end.getMonth()+1}/${end.getDate()}` + (isThisWeek?"(今週)":"");
  document.getElementById("nextWeek").disabled = isThisWeek;

  const total = round1(weekEntries(viewMonday).reduce((s,e)=>s+exOf(e),0));
  document.getElementById("weekTotal").textContent = total;
  document.getElementById("goalDisp").textContent = state.goal;

  const pct = Math.min(100, total/state.goal*100);
  const fill = document.getElementById("trackFill");
  fill.style.width = pct+"%";
  fill.classList.toggle("over", total>=state.goal);

  const ticks = document.getElementById("trackTicks");
  ticks.innerHTML = "";
  const step = state.goal<=12 ? 2 : Math.ceil(state.goal/5);
  for(let v=0; v<=state.goal; v+=step){
    const s=document.createElement("span"); s.textContent=v; ticks.appendChild(s);
  }
  if(state.goal%step!==0){ const s=document.createElement("span"); s.textContent=state.goal; ticks.appendChild(s); }

  const remain = document.getElementById("remainText");
  if(total>=state.goal){
    remain.innerHTML = `<span class="ok">目標達成。</span> 目標を <b>+${round1(total-state.goal)}</b> 上回っています`;
  }else{
    const diff = round1(state.goal-total);
    const walk = Math.ceil(diff*13); // 散歩(早歩き)13分=1メッツ・時
    const jump = Math.ceil(diff*5);  // 縄跳び5分=1メッツ・時
    remain.innerHTML = `あと <b>${diff}</b> メッツ・時 — 早歩き約${walk}分、縄跳びなら約${jump}分`;
  }
  document.getElementById("listTitleJp").textContent = isThisWeek ? "今週の記録" : "この週の記録";
}

/* ====== 記録リスト ====== */
function renderList(){
  const list = document.getElementById("entryList");
  const ents = weekEntries(viewMonday).slice().sort((a,b)=> b.date.localeCompare(a.date) || b.id-a.id);
  if(!ents.length){
    list.innerHTML = '<div class="empty">まだ記録がありません。<br>「＋ 運動を記録」から始めましょう。</div>';
    return;
  }
  const byDay = {};
  ents.forEach(e => (byDay[e.date] ||= []).push(e));
  list.innerHTML = "";
  Object.keys(byDay).sort().reverse().forEach(date=>{
    const g = document.createElement("div");
    const sum = round1(byDay[date].reduce((s,e)=>s+exOf(e),0));
    g.innerHTML = `<div class="day-head"><span>${jpDate(date)}</span><span class="day-sum">${sum} <small>メッツ・時</small></span></div>`;
    byDay[date].forEach(e=>{
      const row = document.createElement("div"); row.className="entry";
      row.innerHTML = `
        <div class="info">
          <div class="name">${esc(e.name)}</div>
          <div class="meta">${e.min}分(${e.unitMin||"—"}分=1メッツ・時)</div>
        </div>
        <div class="ex">${round1(exOf(e))}<small>メッツ・時</small></div>
        <button class="del" aria-label="削除">✕</button>`;
      row.querySelector(".del").onclick = ()=>{
        if(confirm(`「${e.name} ${e.min}分」を削除しますか?`)){
          state.entries = state.entries.filter(x=>x.id!==e.id);
          save(); renderAll();
        }
      };
      g.appendChild(row);
    });
    list.appendChild(g);
  });
}
const esc = s => String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ====== クイック記録(最近使った運動) ====== */
function renderQuick(){
  const sec = document.getElementById("quickSec");
  const box = document.getElementById("quickChips");
  const seen = new Map();
  state.entries.slice().sort((a,b)=>b.id-a.id).forEach(e=>{
    const k = e.name+"|"+e.min;
    if(!seen.has(k) && seen.size<6) seen.set(k,e);
  });
  if(!seen.size){ sec.style.display="none"; return; }
  sec.style.display="";
  box.innerHTML="";
  seen.forEach(e=>{
    const b=document.createElement("button"); b.className="chip";
    b.innerHTML = `${esc(e.name)} ${e.min}分 <b>+${round1(exOf(e))}</b>`;
    b.onclick = ()=>{
      state.entries.push({id:Date.now(), date:fmt(new Date()), name:e.name, unitMin:e.unitMin, min:e.min});
      save(); viewMonday = mondayOf(new Date()); renderAll();
    };
    box.appendChild(b);
  });
}

/* ====== 過去の週 ====== */
function renderHistory(){
  const box = document.getElementById("historyWeeks");
  box.innerHTML="";
  const thisMon = mondayOf(new Date());
  for(let i=7;i>=0;i--){
    const mon = addDays(thisMon,-7*i);
    const total = round1(weekEntries(mon).reduce((s,e)=>s+exOf(e),0));
    const hw = document.createElement("button");
    hw.className = "hw"+(total>=state.goal?" hit":"");
    const h = Math.min(100, total/state.goal*100);
    hw.innerHTML = `<div class="bar-outer"><div class="bar" style="height:${h}%"></div></div>
                    <div class="lbl">${mon.getMonth()+1}/${mon.getDate()}</div>`;
    hw.title = `${total} メッツ・時`;
    hw.onclick = ()=>{ viewMonday = mon; renderAll(); window.scrollTo({top:0,behavior:"smooth"}); };
    box.appendChild(hw);
  }
}

function renderAll(){ renderHeader(); renderList(); renderQuick(); renderHistory(); }

/* ====== 週送り ====== */
document.getElementById("prevWeek").onclick = ()=>{ viewMonday = addDays(viewMonday,-7); renderAll(); };
document.getElementById("nextWeek").onclick = ()=>{ viewMonday = addDays(viewMonday,7); renderAll(); };

/* ====== モーダル ====== */
const modal = document.getElementById("addModal");
let sel = null; // {name, unitMin}

function buildGrid(){
  const grid = document.getElementById("exGrid");
  grid.innerHTML = "";
  EXERCISES.forEach(ex=>{
    const b = document.createElement("button");
    b.className = "ex-btn"+(sel && sel.name===ex.name ? " selected":"");
    b.innerHTML = `<span class="nm">${esc(ex.name)}</span><span class="mn">${ex.unitMin}分<small>=1メッツ・時</small></span>`;
    b.onclick = ()=>{
      sel = ex;
      document.getElementById("minInput").value = ex.unitMin; // 1メッツ・時の分数を初期値に
      buildGrid(); updateCalc();
    };
    grid.appendChild(b);
  });
}

function openModal(){
  sel = null;
  document.getElementById("minInput").value = "";
  document.getElementById("dateInput").value = fmt(new Date());
  buildGrid();
  updateCalc();
  modal.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){ modal.classList.remove("open"); document.body.style.overflow=""; }
document.getElementById("addBtn").onclick = openModal;
document.getElementById("closeModal").onclick = closeModal;
modal.addEventListener("click", e=>{ if(e.target===modal) closeModal(); });

document.getElementById("minInput").addEventListener("input", updateCalc);

/* 左右矢印:タップで±1、長押しで連続変化 */
function nudgeMin(delta){
  const inp = document.getElementById("minInput");
  const cur = parseInt(inp.value,10) || 0;
  inp.value = Math.min(600, Math.max(1, cur + delta));
  updateCalc();
}
function holdable(btn, delta){
  let t=null, iv=null;
  const start = e=>{
    e.preventDefault();
    nudgeMin(delta);
    t = setTimeout(()=>{ iv = setInterval(()=>nudgeMin(delta), 80); }, 450);
  };
  const stop = ()=>{ clearTimeout(t); clearInterval(iv); t=iv=null; };
  btn.addEventListener("pointerdown", start);
  ["pointerup","pointerleave","pointercancel"].forEach(ev=>btn.addEventListener(ev, stop));
  btn.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault(); nudgeMin(delta);} });
}
holdable(document.getElementById("minDown"), -1);
holdable(document.getElementById("minUp"), 1);

function updateCalc(){
  const min = parseInt(document.getElementById("minInput").value,10);
  const ok = sel && min>0;
  document.getElementById("saveBtn").disabled = !ok;
  if(ok){
    document.getElementById("calcFormula").textContent = `${sel.name} ${min}分(${sel.unitMin}分=1メッツ・時)`;
    document.getElementById("calcResult").innerHTML = `+${round1(min/sel.unitMin)} <small>メッツ・時</small>`;
  }else{
    document.getElementById("calcFormula").textContent = "運動と時間を選んでください";
    document.getElementById("calcResult").innerHTML = "— <small>メッツ・時</small>";
  }
}

document.getElementById("saveBtn").onclick = ()=>{
  const min = parseInt(document.getElementById("minInput").value,10);
  const date = document.getElementById("dateInput").value || fmt(new Date());
  if(!sel || !(min>0)) return;
  state.entries.push({id:Date.now(), date, name:sel.name, unitMin:sel.unitMin, min});
  save();
  closeModal();
  viewMonday = mondayOf(new Date(date+"T00:00:00"));
  renderAll();
};

/* ====== 目標変更・データ入出力 ====== */
document.getElementById("goalBtn").onclick = ()=>{
  const v = prompt("週の目標(メッツ・時)を入力してください", state.goal);
  if(v===null) return;
  const g = parseFloat(v);
  if(g>0 && g<=100){ state.goal = g; save(); renderAll(); }
};
document.getElementById("exportBtn").onclick = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `mets-log-${fmt(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("importBtn").onclick = ()=>document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const s = JSON.parse(r.result);
      if(!s || !Array.isArray(s.entries)) throw 0;
      if(confirm(`${s.entries.length}件の記録を読み込みます。現在のデータは置き換えられます。よろしいですか?`)){
        state = {goal: s.goal||10, entries: s.entries};
        save(); renderAll();
      }
    }catch(err){ alert("読み込めませんでした。書き出したJSONファイルを選んでください。"); }
    e.target.value = "";
  };
  r.readAsText(f);
});

renderAll();
</script>
</body>
